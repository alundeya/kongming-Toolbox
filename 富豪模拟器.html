<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:system-ui,sans-serif;}
body{background:#f0f2f5;padding-bottom:80px;}
.container{max-width:600px;margin:0 auto;padding:15px;}
.header{
    background:linear-gradient(135deg,#ff9500,#ff3b30);
    color:white;
    padding:20px 15px;
    border-radius:12px;
    margin-bottom:15px;
    display:flex;
    justify-content:space-between;
    align-items:center;
}
.money-text{font-size:24px;font-weight:bold;}
.tab-box{display:flex;gap:8px;margin-bottom:15px;}
.tab{
    flex:1;text-align:center;padding:12px;
    background:#ddd;border-radius:8px;cursor:pointer;
    font-weight:500;
}
.tab.active{background:#ff9500;color:#fff;}
.panel{display:none;background:#fff;border-radius:12px;padding:15px;box-shadow:0 2px 8px #00000015;}
.panel.show{display:block;}
.item-card{
    display:flex;justify-content:space-between;align-items:center;
    padding:12px;border-bottom:1px solid #eee;
}
.item-name{font-size:16px;}
.item-price{color:#ff3b30;font-weight:bold;}
.btn{
    padding:8px 16px;border:none;border-radius:6px;cursor:pointer;
    font-size:14px;font-weight:500;
}
.btn-buy{background:#28c76f;color:#fff;}
.btn-task{background:#007aff;color:#fff;width:100%;padding:14px;margin:10px 0;}
.task-desc{padding:12px;background:#fff4e5;border-radius:8px;margin:10px 0;line-height:1.6;}
.bag-item{padding:8px 0;border-bottom:1px solid #eee;}
.empty-tip{text-align:center;padding:40px;color:#999;}
.tip-num{color:#ff3b30;font-weight:bold;}
</style>
</head>

    <div class="tab-box">

        <div class="tab" data-tab="shop">豪华商场</div>
        <div class="tab" data-tab="bag">我的背包</div>
    </div>

    <!-- 任务面板 -->
    <div class="panel show" id="task">
        <h3>完成任务赚取金币（每日上限100次）</h3>
        <p>今日已完成任务：<span class="tip-num" id="doneCount">0</span> / 100</p>
        <div class="task-desc" id="taskText"></div>
        <button class="btn btn-task" id="finishTask">完成任务领取奖励</button>
        <p style="font-size:13px;color:#666">每次奖励随机 10 ~ 50 金币，凌晨自动重置全部任务次数</p>
    </div>

    <!-- 商场面板 -->

    <!-- 背包面板 -->
    <div class="panel" id="bag">

        <div id="bagList"></div>

</div>

// 任务库
const taskList = [
    "帮朋友跑腿办事",
    "线上兼职接单",
    "自媒体文案创作",
    "设计一张宣传海报",
    "外卖配送订单",
    "整理文件资料",
    "短视频剪辑工作",
    "客服在线值班",
    "线下市场调研",
    "图片修图美化",
    "文案翻译校对",
    "活动场地布置",
    "数据表格录入",
    "商品上架编辑",
    "社群维护运营"
];

// 获取今日日期标识（用来隔天重置任务）
function getTodayKey(){
    const now = new Date();
    return `${now.getFullYear()}-${now.getMonth()}-${now.getDate()}`;
}

// 初始化存档
function initData(){
    let save = localStorage.getItem(STORAGE_KEY);
    const today = getTodayKey();
    if(!save){
        save = JSON.stringify({
            money:100,
            bag:[],
            taskDate: today,
            taskFinishNum: 0,
            currentTask: getRandomTask()
        });
        localStorage.setItem(STORAGE_KEY,save);
    }
    let data = JSON.parse(save);
    // 如果日期不一样，直接重置今日任务次数
    if(data.taskDate !== today){
        data.taskDate = today;
        data.taskFinishNum = 0;
        data.currentTask = getRandomTask();
        saveData(data);
    }
    return data;
}

// 保存数据到本地
function saveData(data){
    localStorage.setItem(STORAGE_KEY,JSON.stringify(data));
}

// 获取随机任务
function getRandomTask(){
    return taskList[Math.floor(Math.random()*taskList.length)];
}
// 获取10000-20000随机整数金币
function getRandomMoney(){
    return Math.floor(Math.random() * 10001) + 10000;
}

let userData = initData();

// 渲染金钱
function renderMoney(){
    document.getElementById("money").innerText = userData.money;
}

// 渲染任务面板
function renderTask(){
    document.getElementById("doneCount").innerText = userData.taskFinishNum;
    document.getElementById("taskText").innerText = `当前任务：${userData.currentTask}`;
    const btn = document.getElementById("finishTask");
    
    if(userData.taskFinishNum >= MAX_TASK_DAY){
        btn.innerText = "今日任务已全部做完，明天再来";
        btn.disabled = true;
        btn.style.background="#999";
    }else{
        btn.innerText = "完成任务领取奖励，刷新下一个任务";
        btn.disabled = false;
        btn.style.background="#007aff";
    }
}

// 渲染商场
function renderShop(){
    const box = document.getElementById("shopList");
    box.innerHTML = "";
    shopGoods.forEach(good=>{
        const div = document.createElement("div");
        div.className = "item-card";
        div.innerHTML = `
            <div>
                <div class="item-name">${good.name}</div>
                <div class="item-price">${good.price} 金币</div>
            </div>
            <button class="btn btn-buy" data-price="${good.price}" data-name="${good.name}">购买</button>
        `;
        box.appendChild(div);
    })

    // 购买按钮事件
    document.querySelectorAll(".btn-buy").forEach(btn=>{
        btn.onclick = ()=>{
            const price = Number(btn.dataset.price);
            const name = btn.dataset.name;
            if(userData.money >= price){
                userData.money -= price;
                userData.bag.push(name);
                saveData(userData);
                renderMoney();
                renderBag();
                alert(`成功购入【${name}】`);
            }else{
                alert("金币不足！继续做任务积累财富吧");
            }
        }
    })
}

// 渲染背包
function renderBag(){
    const box = document.getElementById("bagList");
    box.innerHTML = "";
    if(userData.bag.length === 0){
        box.innerHTML = '<div class="empty-tip">背包空空，去商场疯狂消费吧</div>';
        return;
    }
    userData.bag.forEach((item,idx)=>{
        const div = document.createElement("div");
        div.className = "bag-item";
        div.innerText = `${idx+1}. ${item}`;
        box.appendChild(div);
    })
}

// 完成任务按钮
document.getElementById("finishTask").onclick = ()=>{
    if(userData.taskFinishNum >= MAX_TASK_DAY) return;
    
    const reward = getRandomMoney();
    userData.money += reward;
    userData.taskFinishNum += 1;
    userData.currentTask = getRandomTask(); // 自动刷新下一个任务
    saveData(userData);
    
    renderMoney();
    renderTask();
    alert(`任务完成！获得 ${reward} 金币\n还可以继续做 ${MAX_TASK_DAY - userData.taskFinishNum} 个任务`);
}

// 标签切换
document.querySelectorAll(".tab").forEach(tab=>{
    tab.onclick = ()=>{
        document.querySelectorAll(".tab").forEach(t=>t.classList.remove("active"));
        tab.classList.add("active");
        const target = tab.dataset.tab;
        document.querySelectorAll(".panel").forEach(p=>p.classList.remove("show"));
        document.getElementById(target).classList.add("show");
    }
})

// 页面初始化渲染
renderMoney();
renderTask();
renderShop();
renderBag();
</script>
