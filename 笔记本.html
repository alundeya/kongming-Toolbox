<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"><title>随心笔记本_空铭工具箱</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;font-family:-apple-system,BlinkMacSystemFont,"PingFang SC","Microsoft YaHei",sans-serif;}
html,body{height:100%;overflow:hidden;background:#f7f7f7;color:#333;}
.app{height:100%;position:relative;overflow:hidden;}
.page{position:absolute;top:0;left:0;width:100%;height:100%;background:#fff;transition:transform 0.24s ease-out;will-change:transform;}
.list-page{transform:translateX(0);}
.edit-page{transform:translateX(100%);}
.page.active{transform:translateX(0);}
.nav{height:46px;background:#fff;border-bottom:1px solid #eee;display:flex;align-items:center;justify-content:space-between;padding:0 12px;position:sticky;top:0;z-index:99;}
.nav-btn{font-size:15px;color:#07c160;padding:6px 10px;background:none;border:none;cursor:pointer;}
.nav-title{font-size:17px;font-weight:500;}
.note-list{height:calc(100% - 46px);overflow-y:auto;-webkit-overflow-scrolling:touch;}
.note-item{padding:14px 16px;border-bottom:1px solid #f0f0f0;cursor:pointer;transition:background 0.15s;}
.note-item:active{background:#f2f2f2;}
.note-title{font-size:16px;margin-bottom:4px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.note-time{font-size:12px;color:#999;}
.add-btn{position:fixed;right:20px;bottom:24px;width:52px;height:52px;border-radius:50%;background:#07c160;color:#fff;border:none;font-size:28px;box-shadow:0 2px 12px rgba(7,193,96,0.3);cursor:pointer;display:flex;align-items:center;justify-content:center;}
.edit-wrap{height:calc(100% - 46px);display:flex;flex-direction:column;}
.input-title{padding:14px 16px;font-size:18px;border:none;border-bottom:1px solid #eee;outline:none;}
.text-content{flex:1;padding:14px 16px;font-size:16px;border:none;outline:none;resize:none;}
.empty-tip{height:100%;display:flex;align-items:center;justify-content:center;color:#bbb;font-size:15px;}
</style>
</head>
<body>
<div class="app">
    <div class="page list-page active">
        <div class="nav">
            <div class="nav-title">笔记</div>
            <button class="nav-btn" id="clearBtn">清空</button>
        </div>
        <div class="note-list" id="listBox"></div>
        <button class="add-btn" id="addBtn">+</button>
    </div>
     <div class="page edit-page">
        <div class="nav">
            <button class="nav-btn" id="backBtn">返回</button>
            <div class="nav-title">编辑笔记</div>
            <button class="nav-btn" id="saveBtn">保存</button>
        </div>
        <div class="edit-wrap">
            <input class="input-title" id="titleInput" placeholder="标题">
            <textarea class="text-content" id="contentInput" placeholder="在这里记录内容..."></textarea>
        </div>
    </div>
</div>

<script>
let currentId = null;
const listPage = document.querySelector('.list-page');
const editPage = document.querySelector('.edit-page');
const listBox = document.getElementById('listBox');
const titleInput = document.getElementById('titleInput');
const contentInput = document.getElementById('contentInput');
function getNotes(){
    return JSON.parse(localStorage.getItem('wxNotes')) || [];
}
function saveNotes(arr){
    localStorage.setItem('wxNotes',JSON.stringify(arr));
}
function renderList(){
    const notes = getNotes();
    if(notes.length === 0){
        listBox.innerHTML = '<div class="empty-tip">暂无笔记，点击右下角加号创建</div>';
        return;
    }
    listBox.innerHTML = notes.map(item=>`
        <div class="note-item" data-id="${item.id}">
            <div class="note-title">${item.title || '无标题'}</div>
            <div class="note-time">${item.time}</div>
        </div>
    `).join('');
    document.querySelectorAll('.note-item').forEach(el=>{
        el.onclick = ()=> openEdit(el.dataset.id);
    })
}

function openEdit(id = null){
    currentId = id;
    if(id){
        const note = getNotes().find(v=>v.id===id);
        titleInput.value = note.title;
        contentInput.value = note.content;
    }else{
        titleInput.value = '';
        contentInput.value = '';
    }
    listPage.classList.remove('active');
    editPage.classList.add('active');
}

function backList(){
    editPage.classList.remove('active');
    listPage.classList.add('active');
    renderList();
}

function saveNote(){
    const title = titleInput.value.trim();
    const content = contentInput.value.trim();
    if(!title && !content) return alert('内容不能为空');

    const notes = getNotes();
    const time = new Date().toLocaleString();

    if(currentId){     
        const index = notes.findIndex(v=>v.id===currentId);
        notes[index] = {...notes[index],title,content,time};
    }else{     
        notes.unshift({
            id:Date.now().toString(),
            title,content,time
        })
    }
    saveNotes(notes);
    backList();
}
document.getElementById('addBtn').onclick = ()=> openEdit();
document.getElementById('backBtn').onclick = backList;
document.getElementById('saveBtn').onclick = saveNote;
document.getElementById('clearBtn').onclick = ()=>{
    if(confirm('确定清空所有笔记？无法恢复')){
        localStorage.removeItem('wxNotes');
        renderList();
    }
}
renderList();
</script>
</body>
</html>
