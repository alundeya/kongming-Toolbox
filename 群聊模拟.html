<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>群聊模拟_空铭工具箱</title>
<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:system-ui, sans-serif;
}
body{
    background:#fff;
    color:block;
    max-width:480px;
    margin:0 auto;
    min-height:100vh;
}
/* 顶部用户栏 */
.top-user-bar{
    display:flex;
    align-items:center;
    justify-content:space-between;
    padding:20px 16px;
}
.user-info{
    display:flex;
    align-items:center;
    gap:10px;
}
.user-avatar{
    width:48px;
    height:48px;
    border-radius:50%;
    object-fit:cover;
}
.user-name{
    font-size:20px;
    font-weight:500;
}
.leave-text{
    font-size:13px;
    color:#07c160;
    display:block;
}
.add-btn{
    font-size:32px;
    color:block;
    background:none;
    border:none;
    cursor:pointer;
}
/* 搜索框 */
.search-box{
    margin:0 16px 20px;
    background:#ededed;
    border-radius:10px;
    padding:10px 14px;
    display:flex;
    align-items:center;
    gap:8px;
}
.search-box input{
    flex:1;
    background:transparent;
    border:none;
    color:#ddd;
    font-size:15px;
    outline:none;
}
.search-box svg{
    width:16px;
    fill:#999;
}
/* 创建群聊弹窗 */
.modal-mask{
    position:fixed;
    inset:0;
    background:rgba(0,0,0,0.7);
    display:none;
    align-items:center;
    justify-content:center;
    z-index:99;
}
.modal-box{
    background:#272729;
    width:90%;
    border-radius:12px;
    padding:20px;
}
.modal-box h3{
    margin-bottom:16px;
    text-align:center;
}
.form-item{
    margin-bottom:12px;
}
.form-item label{
    display:block;
    font-size:14px;
    color:#ccc;
    margin-bottom:4px;
}
.form-item input{
    width:100%;
    padding:10px;
    border-radius:6px;
    border:none;
    background:#38383b;
    color:#fff;
    outline:none;
}
.modal-btns{
    display:flex;
    gap:10px;
    margin-top:18px;
}
.modal-btns button{
    flex:1;
    padding:10px;
    border-radius:6px;
    border:none;
    font-size:15px;
    cursor:pointer;
}
.btn-cancel{
    background:#444;
    color:#fff;
}
.btn-save{
    background:#07c160;
    color:#fff;
}
/* 聊天列表 */
.chat-list{
    padding:0 16px;
}
.chat-item{
    display:flex;
    gap:12px;
    padding:14px 0;
    border-bottom:1px solid #ededed;
    cursor:pointer;
    position:relative;
}
.chat-item:active{
    background:#fff;
}
.chat-avatar{
    width:56px;
    height:56px;
    border-radius:10px;
    object-fit:cover;
}
.chat-badge{
    position:absolute;
    left:44px;
    top:10px;
    background:block;
    width:22px;
    height:22px;
    border-radius:50%;
    font-size:12px;
    display:grid;
    place-items:center;
}
.chat-main{
    flex:1;
    overflow:hidden;
}
.chat-top{
    display:flex;
    justify-content:space-between;
    align-items:center;
    margin-bottom:4px;
}
.chat-name{
    font-size:17px;
}
.chat-time{
    font-size:13px;
    color:#aaa;
}
.chat-lastmsg{
    font-size:14px;
    color:#999;
    white-space:nowrap;
    overflow:hidden;
    text-overflow:ellipsis;
}
.mention-tag{
    color:#f53f3f;
}
/* 聊天页面 */
.chat-page{
    display:none;
    flex-direction:column;
    height:100vh;
}
.chat-header{
    display:flex;
    align-items:center;
    gap:10px;
    padding:16px;
    background:#fff;
}
.back-btn{
    color:#ededed;
    font-size:22px;
    background:none;
    border:none;
    cursor:pointer;
}
.msg-container{
    flex:1;
    padding:16px;
    overflow-y:auto;
    background:block;
}
.msg-row{
    margin-bottom:14px;
    display:flex;
    gap:8px;
}
.msg-self{
    flex-direction:row-reverse;
}
.msg-avatar{
    width:40px;
    height:40px;
    border-radius:8px;
}
.msg-bubble{
    max-width:70%;
    padding:10px 12px;
    border-radius:8px;
    font-size:15px;
}
.other-bubble{
    background:#ededed;
}
.self-bubble{
    background:#07c160;
}
/* 修改发送栏：双按钮布局 */
.send-box{
    display:flex;
    gap:8px;
    padding:12px 16px;
    background:#fff;
    align-items:center;
}
.send-box input{
    flex:1;
    padding:10px 14px;
    border-radius:20px;
    border:none;
    background:#ededed;
    color:block;
    outline:none;
}
.btn-self{
    padding:8px 12px;
    border-radius:20px;
    border:none;
    background:#07c160;
    color:#fff;
    cursor:pointer;
    font-size:14px;
}
.btn-other{
    padding:8px 12px;
    border-radius:20px;
    border:none;
    background:#555;
    color:#fff;
    cursor:pointer;
    font-size:14px;
}
</style>
</head>
<body>
<!-- 首页聊天列表 -->
<div id="list-page">
    <div class="top-user-bar">
        <div class="user-info">
            <img class="user-avatar" id="myAvatar" src="https://zh.minecraft.wiki/images/Diamond_Pickaxe_JE3_BE3.png">
            <div>
                <div class="user-name">可爱的钻石镐</div>
                <span class="leave-text">在线</span>
            </div>
        </div>
        <button class="add-btn" id="createGroupBtn">+</button>
    </div>
    <div class="search-box">
        <svg viewBox="0 0 24 24"><path d="M15.5 14h-.79l-.28-.27A6.471 6.471 0 0016 9.5 6.5 6.5 0 009.5 3 6.5 6.5 0 003 9.5 6.5 6.5 0 009.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z"/></svg>
        <input placeholder="搜索">
    </div>
    <div class="chat-list" id="chatListWrap"></div>
</div>

<!-- 创建群弹窗 -->
<div class="modal-mask" id="createModal">
    <div class="modal-box">
        <h3>新建群聊</h3>
        <div class="form-item">
            <label>群聊名称</label>
            <input id="groupNameInput" placeholder="输入群名称">
        </div>
        <div class="form-item">
            <label>群头像链接（图片URL）</label>
            <input id="groupAvatarInput" placeholder="粘贴图片地址，留空用默认">
        </div>
        <div class="form-item">
            <label>对方头像链接（聊天用）</label>
            <input id="otherAvatarInput" placeholder="粘贴对方头像图片地址">
        </div>
        <div class="modal-btns">
            <button class="btn-cancel" id="closeModal">取消</button>
            <button class="btn-save" id="saveGroup">创建</button>
        </div>
    </div>
</div>

<!-- 聊天详情页面（新增对方发送按钮） -->
<div class="chat-page" id="chatDetailPage">
    <div class="chat-header">
        <button class="back-btn" id="backListBtn"></button>
        <img class="chat-avatar" id="currentGroupAvatar">
        <span id="currentGroupName"></span>
    </div>
    <div class="msg-container" id="msgWrap"></div>
    <div class="send-box">
        <input id="msgInput" placeholder="输入消息...">
        <button class="btn-self" id="sendSelfBtn">我方发送</button>
        <button class="btn-other" id="sendOtherBtn">替对方发送</button>
    </div>
</div>

<script>
// 全局数据，本地存储
let groupList = JSON.parse(localStorage.getItem("chatGroups")) || [];
let currentChatId = null;
const listPage = document.getElementById("list-page");
const chatDetailPage = document.getElementById("chatDetailPage");
const chatListWrap = document.getElementById("chatListWrap");
const msgWrap = document.getElementById("msgWrap");
const msgInput = document.getElementById("msgInput");

// 初始化渲染列表
function renderChatList(){
    chatListWrap.innerHTML = "";
    groupList.forEach((group, index)=>{
        const lastMsg = group.msgList.length ? group.msgList[group.msgList.length-1].text : "暂无消息";
        const lastTime = group.msgList.length ? group.msgList[group.msgList.length-1].time : "刚刚";
        const item = document.createElement("div");
        item.className = "chat-item";
        item.dataset.id = index;
        item.innerHTML = `
            <img class="chat-avatar" src="${group.avatar || 'https://picsum.photos/id/237/100/100'}">
            <div class="chat-main">
                <div class="chat-top">
                    <div class="chat-name">${group.name}</div>
                    <div class="chat-time">${lastTime}</div>
                </div>
                <div class="chat-lastmsg">${lastMsg}</div>
            </div>
        `;
        item.onclick = ()=> openChat(index);
        chatListWrap.appendChild(item);
    })
}

// 打开聊天窗口
function openChat(id){
    currentChatId = id;
    const group = groupList[id];
    listPage.style.display = "none";
    chatDetailPage.style.display = "flex";
    document.getElementById("currentGroupName").innerText = group.name;
    document.getElementById("currentGroupAvatar").src = group.avatar || 'https://picsum.photos/id/237/100/100';
    renderMsg();
}

// 渲染聊天消息
function renderMsg(){
    const group = groupList[currentChatId];
    msgWrap.innerHTML = "";
    group.msgList.forEach(msg=>{
        const row = document.createElement("div");
        row.className = `msg-row ${msg.isSelf ? 'msg-self' : ''}`;
        row.innerHTML = `
            <img class="msg-avatar" src="${msg.isSelf ? document.getElementById("myAvatar").src : group.otherAvatar}">
            <div class="msg-bubble ${msg.isSelf ? 'self-bubble' : 'other-bubble'}">${msg.text}</div>
        `;
        msgWrap.appendChild(row);
    })
    msgWrap.scrollTop = msgWrap.scrollHeight;
}

// 统一发送消息函数，isSelf=true=我方，false=对方
function sendMessage(isSelf){
    const text = msgInput.value.trim();
    if(!text) return;
    const now = new Date();
    const time = `${now.getHours()}:${String(now.getMinutes()).padStart(2,'0')}`;
    // 存入消息列表
    groupList[currentChatId].msgList.push({
        text, time, isSelf
    })
    saveLocal();
    renderMsg();
    msgInput.value = "";
}

// 绑定两个发送按钮
document.getElementById("sendSelfBtn").onclick = ()=> sendMessage(true);
document.getElementById("sendOtherBtn").onclick = ()=> sendMessage(false);
// 回车默认我方发送
msgInput.onkeydown = (e)=>{
    if(e.key === "Enter") sendMessage(true);
}

// 创建群弹窗逻辑
const modal = document.getElementById("createModal");
document.getElementById("createGroupBtn").onclick = ()=> modal.style.display = "flex";
document.getElementById("closeModal").onclick = ()=> modal.style.display = "none";
document.getElementById("saveGroup").onclick = ()=>{
    const name = document.getElementById("groupNameInput").value.trim();
    const avatar = document.getElementById("groupAvatarInput").value.trim();
    const otherAvatar = document.getElementById("otherAvatarInput").value.trim();
    if(!name){
        alert("请填写群聊名称");
        return;
    }
    groupList.push({
        name,
        avatar,
        otherAvatar: otherAvatar || "https://picsum.photos/id/1025/100/100",
        msgList:[]
    })
    saveLocal();
    renderChatList();
    modal.style.display = "none";
    // 清空输入框
    document.getElementById("groupNameInput").value = "";
    document.getElementById("groupAvatarInput").value = "";
    document.getElementById("otherAvatarInput").value = "";
}

// 返回聊天列表
document.getElementById("backListBtn").onclick = ()=>{
    chatDetailPage.style.display = "none";
    listPage.style.display = "block";
    renderChatList();
}

// 本地存储保存
function saveLocal(){
    localStorage.setItem("chatGroups", JSON.stringify(groupList));
}

// 页面初始化
renderChatList();
</script>
</body>
</html>
