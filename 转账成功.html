<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>支付成功模拟器_空铭工具箱</title>
<style>
*{
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: system-ui, -apple-system, BlinkMacSystemFont, "PingFang SC", sans-serif;
}
html,body{
    background-color: #000000;
    color: #ffffff;
    max-width: 100vw;
    overflow-x: hidden;
    height: 100vh;
    display: flex;
    flex-direction: column;
}

/* 顶部状态栏 */
.top-bar{
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 14px 16px 8px;
    font-size: 16px;
}
.back-arrow{
    font-size: 22px;
    color: #fff;
    cursor: default;
}
.top-right-time{
    font-size: 16px;
}

/* 成功图标区域 */
.success-section{
    display: flex;
    flex-direction: column;
    align-items: center;
    padding-top: 40px;
}

.success-icon{
    width: 72px;
    height: 72px;
    border-radius: 50%;
    background-color: #07c160;
    display: flex;
    align-items: center;
    justify-content: center;
    margin-bottom: 16px;
}

.success-icon svg{
    width: 40px;
    height: 40px;
    stroke: #000;
    stroke-width: 3;
    fill: none;
    stroke-linecap: round;
    stroke-linejoin: round;
}

.success-title{
    font-size: 15px;
    color: #07c160;
    margin-bottom: 8px;
}

.success-desc{
    font-size: 13px;
    color: #aaaaaa;
    margin-bottom: 32px;
}

/* 金额 */
.amount-section{
    text-align: center;
    margin-bottom: 36px;
}

.amount{
    font-size: 48px;
    font-weight: 500;
    letter-spacing: 1px;
}

/* 完成按钮 */
.btn-section{
    margin-top: auto;
    padding: 12px 16px 24px;
}

.complete-btn{
    width: 100%;
    height: 40px;
    background-color: #1c1c1e;
    color: #fff;
    border: none;
    border-radius: 5px;
    font-size: 15px;
    cursor: default;
}

/* 底部免责声明 */
.disclaimer{
    font-size: 11px;
    color: #666;
    text-align: center;
    padding-bottom: 18px;
    line-height: 1.5;
}

/* 修改信息按钮 */
.edit-btn{
    position: fixed;
    bottom: 60px;
    left: 14px;
    padding: 6px 12px;
    background: #222;
    color: #fff;
    border: none;
    border-radius: 6px;
    z-index: 99;
    font-size: 14px;
}

.set-modal{
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.85);
    z-index: 100;
    padding: 20px;
}

.set-inner{
    background: #1a1a1a;
    border-radius: 12px;
    padding: 20px;
    display: flex;
    flex-direction: column;
    gap: 12px;
}

.set-inner input{
    padding: 11px;
    border-radius: 6px;
    border: none;
    font-size: 15px;
}

.set-inner button{
    padding: 10px;
    border: none;
    border-radius: 6px;
    color: #fff;
    font-size: 15px;
}

.save-btn{
    background: #07c160;
}

.close-btn{
    background: #333;
}
</style>
</head>
<body>
    <div class="success-section">
        <div class="success-icon">
            <svg viewBox="0 0 24 24">
                <polyline points="20 6 9 17 4 12"></polyline>
            </svg>
        </div>
        <div class="success-title">支付成功</div>
        <div class="success-desc" id="descText">待@名字确认收款</div>
    </div>

    <div class="amount-section">
        <div class="amount" id="amountText">¥0.01</div>
    </div>

    <div class="btn-section">
        <button class="complete-btn">完成</button>
    </div>

    <div class="disclaimer">
        纯属虚构，出事了我不负责，仅为娱乐
    </div>

    <button class="edit-btn" onclick="openSet()">修改信息</button>

    <div class="set-modal" id="setModal">
        <div class="set-inner">
            <input placeholder="收款确认提示" id="inpDesc">
            <input placeholder="支付金额，例如：¥0.01" id="inpAmount">
            <button class="save-btn" onclick="saveInfo()">确认保存</button>
            <button class="close-btn" onclick="closeSet()">关闭</button>
        </div>
    </div>

<script>
const modal = document.getElementById('setModal');

function openSet(){
    modal.style.display = 'flex';
}

function closeSet(){
    modal.style.display = 'none';
}

function saveInfo(){
    const desc = document.getElementById('inpDesc').value;
    const amount = document.getElementById('inpAmount').value;

    if(desc){
        document.getElementById('descText').innerText = desc;
    }
    if(amount){
        document.getElementById('amountText').innerText = amount;
    }

    closeSet();
}
</script>

</body>
</html>
